name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # e.g. v1.0.0, v0.1.0

jobs:
  move-moving-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Move major moving tag (vN)
        run: |
          # Extract the major version from the pushed tag (e.g. v1.0.0 → v1)
          tag="${GITHUB_REF_NAME}"
          major=$(echo "$tag" | grep -oP '^v\d+')

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Force-move the major moving tag to the same SHA
          git tag -f "$major"
          git push origin "refs/tags/${major}" --force

          echo "Moved ${major} to $(git rev-parse HEAD)"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            --verify-tag
